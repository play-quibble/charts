# Example production values for Quibble.
#
# Install:
#   helm install quibble oci://ghcr.io/benbotsford/charts/quibble \
#     --namespace trivia --create-namespace \
#     --values values-example.yaml \
#     --set api.secret.databaseUrl="postgres://user:pass@host/dbname?sslmode=require" \
#     --set redis.password="change-me"
#
# Prerequisites:
#   - ingress-nginx installed (https://kubernetes.github.io/ingress-nginx)
#   - cert-manager installed with a ClusterIssuer named "letsencrypt-prod"
#     (https://cert-manager.io/docs/installation/helm/)

api:
  replicaCount: 1

  env:
    logLevel: info
    auth0Domain: "your-tenant.us.auth0.com"
    auth0Audience: "https://api.playquibble.io"

  # Pass sensitive values via --set or a separate secrets file, not committed to git.
  secret:
    databaseUrl: ""   # --set api.secret.databaseUrl="postgres://..."

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

web:
  replicaCount: 1

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

redis:
  # password: ""   # --set redis.password="change-me"

  persistence:
    size: 1Gi
    # storageClass: ""   # leave blank to use cluster default

  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      memory: 64Mi

ingress:
  enabled: true
  className: nginx
  host: "playquibble.io"   # replace with your domain
  tls:
    enabled: true
    secretName: quibble-tls
