apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "quibble.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "quibble.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "quibble.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "quibble.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "quibble.serviceAccountName" . }}
      containers:
        - name: api
          image: {{ include "quibble.apiImage" . }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ADDR
              value: ":8080"
            - name: LOG_LEVEL
              value: {{ .Values.api.env.logLevel | quote }}
            - name: AUTH0_DOMAIN
              value: {{ .Values.api.env.auth0Domain | quote }}
            - name: AUTH0_AUDIENCE
              value: {{ .Values.api.env.auth0Audience | quote }}
            - name: REDIS_ADDR
              value: "{{ include "quibble.fullname" . }}-redis:6379"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "quibble.fullname" . }}
                  key: DATABASE_URL
            {{- if .Values.redis.password }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "quibble.fullname" . }}
                  key: REDIS_PASSWORD
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          {{- with .Values.api.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
