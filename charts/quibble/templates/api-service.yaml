apiVersion: v1
kind: Service
metadata:
  name: {{ include "quibble.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "quibble.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  # ClientIP affinity ensures WebSocket connections always reach the same pod.
  # The realtime hub is in-process, so a client that round-robins to a different
  # pod on reconnect will be dropped from its game. This is a guardrail — keep
  # replicaCount: 1 until the hub is externalised to Redis pub/sub.
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      # 4 hours — long enough to cover a full trivia night without re-pinning.
      timeoutSeconds: 14400
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "quibble.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
