apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "quibble.fullname" . }}-web
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "quibble.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "quibble.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "quibble.labels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: {{ include "quibble.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web
          image: {{ include "quibble.webImage" . }}
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            # Used by Next.js SSR/server actions to reach the API inside the cluster.
            # The ingress handles /api/* for browser requests.
            - name: API_URL
              value: "http://{{ include "quibble.fullname" . }}-api:8080"
            # Auth0 SDK configuration — all five vars are required in production.
            - name: AUTH0_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "quibble.fullname" . }}
                  key: AUTH0_SECRET
            - name: AUTH0_BASE_URL
              value: {{ required "web.env.auth0BaseUrl is required" .Values.web.env.auth0BaseUrl | quote }}
            - name: AUTH0_ISSUER_BASE_URL
              value: {{ required "web.env.auth0IssuerBaseUrl is required" .Values.web.env.auth0IssuerBaseUrl | quote }}
            - name: AUTH0_CLIENT_ID
              value: {{ required "web.env.auth0ClientId is required" .Values.web.env.auth0ClientId | quote }}
            - name: AUTH0_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "quibble.fullname" . }}
                  key: AUTH0_CLIENT_SECRET
            # Audience forwarded to Auth0 so access tokens can be validated by the API.
            - name: AUTH0_AUDIENCE
              value: {{ .Values.api.env.auth0Audience | quote }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.web.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
