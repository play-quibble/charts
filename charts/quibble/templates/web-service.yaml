apiVersion: v1
kind: Service
metadata:
  name: {{ include "quibble.fullname" . }}-web
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "quibble.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "quibble.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
