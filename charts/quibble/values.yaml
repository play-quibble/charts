nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

# -- API (Go backend)
api:
  image:
    repository: ghcr.io/benbotsford/trivia-api
    # tag defaults to .Chart.AppVersion
    tag: ""
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources: {}
  env:
    logLevel: info
    auth0Domain: ""
    auth0Audience: ""
  # -- Sensitive values — set via --set or a values override file, never commit
  secret:
    # postgres connection string
    databaseUrl: ""

# -- Web (Next.js frontend)
web:
  image:
    repository: ghcr.io/benbotsford/trivia-web
    tag: ""
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources: {}

# -- Redis (bundled, no external dependency)
redis:
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  resources: {}
  persistence:
    size: 1Gi
    storageClass: ""
  # -- If set, Redis requires a password (REDIS_PASSWORD propagated to API automatically)
  password: ""

# -- Ingress
ingress:
  enabled: true
  className: nginx
  # host is required when ingress is enabled
  host: ""
  annotations: {}
  tls:
    enabled: true
    secretName: quibble-tls
